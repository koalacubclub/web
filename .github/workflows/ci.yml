name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Force JavaScript-based actions (pnpm/action-setup@v4 etc.) to run on Node 24.
# GitHub is deprecating Node 20 in actions on 2026-09-16 and defaulting to
# Node 24 on 2026-06-02 — opting in now silences the deprecation warning and
# surfaces any Node-24-only breakage early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a run on main: parallel merges would cancel each other's
  # required checks, leaving commits un-gated. Only supersede in-progress PR runs.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Jobs are grouped by COST/SETUP, not by task. The fast static checks are
  # seconds each, so they share one install. test / build / e2e stay separate:
  # they run on parallel runners (wall-clock ≈ slowest job, not the sum) and
  # isolating them means a failure in one can't mask or block the others.

  static:
    # lint + typecheck + format, one install. `if: ${{ !cancelled() }}` runs
    # every step even after an earlier one fails, so a lint error doesn't hide a
    # typecheck error — you see all hygiene issues in a single pass.
    name: static (lint + typecheck + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck
      - name: Format
        if: ${{ !cancelled() }}
        run: pnpm format:check

  test:
    # Unit/integration suite, isolated from the static checks so a formatting nit
    # can never mask a real test failure — and, on a parallel runner, at no extra
    # wall-clock. Vitest annotates the failing file/line inline on the PR.
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    # Production bundle. Own job so a build failure is immediately visible
    # without expanding a combined check.
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    # Playwright functional tests — boots the app via playwright.config.ts's
    # webServer and drives a real headless Chromium against the running stack.
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
